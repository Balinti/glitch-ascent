<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glitch Ascent - Free HTML5 Game</title>
  <meta name="description" content="Play Glitch Ascent - Tap to climb glowing platforms while random control reversals and gravity shifts corrupt your path upward.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <meta property="og:title" content="Glitch Ascent - Free HTML5 Game">
  <meta property="og:description" content="Tap to toggle between SOLID and GHOST states. Climb the corrupted server tower. How high can you go?">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://balinti.github.io/glitch-ascent/">
  <meta property="og:image" content="https://balinti.github.io/glitch-ascent/preview.png">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4099346100621490" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 750px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
  </style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');

let W, H, DPR;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

let state = 'start';
let score = 0;
let best = parseInt(localStorage.getItem('ga_best') || '0');
let combo = 1;
let comboCount = 0;
let hue = 180;
let shake = 0;
let shakeDx = 0, shakeDy = 0;
let particles = [];
let platforms = [];
let scrollSpeed = 1.2;
let lastTime = 0;

let player = {};
function resetPlayer() {
  player = {
    x: W / 2,
    y: H * 0.65,
    w: 28,
    h: 28,
    vy: 0,
    solid: true,
    onGround: false,
    dead: false,
    deathTimer: 0,
    glitchTimer: 0,
  };
}

function makePlatform(y, forceType) {
  const type = forceType || (Math.random() < 0.65 ? 'safe' : 'corrupt');
  const w = 60 + Math.random() * 90;
  const x = 20 + Math.random() * (W - 40 - w);
  return { x, y, w, h: 14, type, hit: false, flash: 0 };
}

function initPlatforms() {
  platforms = [];
  platforms.push({ x: W/2 - 70, y: H * 0.7, w: 140, h: 14, type: 'safe', hit: false, flash: 0 });
  let py = H * 0.7 - 90;
  for (let i = 0; i < 20; i++) {
    const t = i < 4 ? 'safe' : undefined;
    platforms.push(makePlatform(py, t));
    py -= 75 + Math.random() * 40;
  }
}

function spawnParticles(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
      col,
    });
  }
}

function startGame() {
  score = 0;
  combo = 1;
  comboCount = 0;
  scrollSpeed = 1.2;
  hue = 180;
  particles = [];
  shake = 0;
  resetPlayer();
  initPlatforms();
  state = 'playing';
}

function onInput() {
  if (state === 'start') { startGame(); return; }
  if (state === 'gameover') { startGame(); return; }
  if (state === 'playing' && !player.dead) {
    player.solid = !player.solid;
    player.glitchTimer = 8;
    if (!player.solid) { combo = 1; comboCount = 0; }
    spawnParticles(player.x, player.y, player.solid ? '#0ff' : '#c0f', 8);
  }
}
canvas.addEventListener('pointerdown', onInput);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); onInput(); }
});

const GRAVITY = 0.45;
const MAX_FALL = 12;

function triggerDeath() {
  player.dead = true;
  player.deathTimer = 50;
  shake = 18;
  spawnParticles(player.x, player.y, '#f44', 28);
  if (score > best) { best = score; localStorage.setItem('ga_best', best); }
}

function update() {
  scrollSpeed = 1.2 + score * 0.012;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (shake > 0) {
    shakeDx = (Math.random() - 0.5) * shake;
    shakeDy = (Math.random() - 0.5) * shake;
    shake *= 0.82;
    if (shake < 0.5) shake = 0;
  } else { shakeDx = 0; shakeDy = 0; }

  if (player.dead) {
    player.deathTimer--;
    if (player.deathTimer <= 0) state = 'gameover';
    return;
  }

  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  player.y += player.vy;

  for (let p of platforms) p.y += scrollSpeed;
  platforms = platforms.filter(p => p.y < H + 40);
  const topY = platforms.length ? Math.min(...platforms.map(p => p.y)) : 0;
  while (platforms.length < 22) {
    platforms.push(makePlatform(topY - 75 - Math.random() * 50));
  }

  if (player.glitchTimer > 0) player.glitchTimer--;

  player.onGround = false;

  if (player.solid) {
    for (let p of platforms) {
      if (
        player.vy >= 0 &&
        player.x + player.w/2 > p.x &&
        player.x - player.w/2 < p.x + p.w &&
        player.y + player.h/2 >= p.y &&
        player.y + player.h/2 <= p.y + p.h + player.vy + 2
      ) {
        if (p.type === 'safe') {
          player.y = p.y - player.h/2;
          player.vy = 0;
          player.onGround = true;
          if (!p.hit) {
            p.hit = true;
            p.flash = 12;
            score += combo;
            comboCount++;
            if (comboCount >= 3) combo = Math.min(combo * 2, 8);
            spawnParticles(player.x, p.y, `hsl(${hue},100%,70%)`, 6);
          }
        } else {
          p.flash = 20;
          triggerDeath();
          return;
        }
      }
    }
  }
  // GHOST: no collision with either type

  if (player.y - player.h/2 > H + 40) { triggerDeath(); }

  player.x = W / 2;
}

function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, `hsl(${(hue+180)%360},60%,7%)`);
  grad.addColorStop(1, `hsl(${hue},60%,3%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = `hsla(${hue},80%,50%,0.05)`;
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPlatform(p) {
  if (p.type === 'safe') {
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = p.flash > 0 ? 20 : 8;
    ctx.fillStyle = p.flash > 0 ? '#fff' : 'rgba(0,255,220,0.85)';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = p.flash > 0 ? '#0ff' : 'rgba(0,200,180,0.7)';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('[SAFE]', p.x + p.w/2, p.y + 10);
  } else {
    ctx.shadowColor = '#f0f';
    ctx.shadowBlur = p.flash > 0 ? 24 : 10;
    ctx.fillStyle = p.flash > 0 ? '#f44' : 'rgba(200,0,255,0.85)';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.save();
    ctx.beginPath();
    ctx.rect(p.x, p.y, p.w, p.h);
    ctx.clip();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 3;
    for (let sx = p.x - p.h; sx < p.x + p.w; sx += 8) {
      ctx.beginPath();
      ctx.moveTo(sx, p.y + p.h);
      ctx.lineTo(sx + p.h, p.y);
      ctx.stroke();
    }
    ctx.restore();
    ctx.shadowBlur = 0;
    ctx.fillStyle = p.flash > 0 ? '#ff0' : 'rgba(255,100,255,0.8)';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('[CORRUPT]', p.x + p.w/2, p.y + 10);
  }
  ctx.shadowBlur = 0;
  if (p.flash > 0) p.flash--;
}

function drawPlayer() {
  const { x, y, w, h, solid, glitchTimer, dead, deathTimer } = player;
  if (dead) {
    ctx.save();
    ctx.globalAlpha = deathTimer / 50;
    ctx.shadowColor = '#f44';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#f44';
    ctx.fillRect(x - w/2, y - h/2, w, h);
    ctx.restore();
    return;
  }
  const glitch = glitchTimer > 0;
  if (solid) {
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = glitch ? 30 : 14;
    ctx.fillStyle = '#0ff';
    ctx.fillRect(x - w/2, y - h/2, w, h);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillRect(x - w/2 + 4, y - h/2 + 4, w - 8, 5);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#003';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SOLID', x, y + 4);
  } else {
    ctx.shadowColor = '#c0f';
    ctx.shadowBlur = glitch ? 30 : 14;
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#c0f';
    ctx.fillRect(x - w/2, y - h/2, w, h);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#c0f';
    ctx.lineWidth = 2;
    ctx.strokeRect(x - w/2, y - h/2, w, h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GHOST', x, y + 4);
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = `hsl(${hue},100%,75%)`;
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'left';
  ctx.shadowColor = `hsl(${hue},100%,60%)`;
  ctx.shadowBlur = 10;
  ctx.fillText(score, 16, 40);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '12px monospace';
  ctx.fillText('BEST ' + best, 16, 58);

  if (combo > 1) {
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold ' + (14 + combo * 2) + 'px monospace';
    ctx.textAlign = 'right';
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 12;
    ctx.fillText('x' + combo, W - 16, 40);
    ctx.shadowBlur = 0;
  }

  const sc = player.solid ? '#0ff' : '#c0f';
  ctx.fillStyle = sc;
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = sc;
  ctx.shadowBlur = 8;
  ctx.fillText(player.solid ? '[ SOLID ]' : '[ GHOST ]', W/2, 36);
  ctx.shadowBlur = 0;
}

function drawStart() {
  drawBg();
  ctx.textAlign = 'center';
  ctx.fillStyle = `hsl(${hue},100%,70%)`;
  ctx.font = 'bold 40px monospace';
  ctx.shadowColor = `hsl(${hue},100%,60%)`;
  ctx.shadowBlur = 24;
  ctx.fillText('GLITCH', W/2, H/2 - 88);
  ctx.fillStyle = '#fff';
  ctx.fillText('ASCENT', W/2, H/2 - 46);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '13px monospace';
  ctx.fillText('Climb the corrupted tower.', W/2, H/2 + 4);
  ctx.fillText('TAP to toggle SOLID / GHOST.', W/2, H/2 + 24);
  ctx.fillStyle = '#0ff';
  ctx.font = '12px monospace';
  ctx.fillText('SOLID  lands on  [SAFE]', W/2, H/2 + 54);
  ctx.fillStyle = '#c0f';
  ctx.fillText('GHOST  passes  [CORRUPT]', W/2, H/2 + 72);
  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px monospace';
  ctx.fillText('TAP TO START', W/2, H/2 + 118);
  ctx.globalAlpha = 1;
  if (best > 0) {
    ctx.fillStyle = 'rgba(255,255,0,0.6)';
    ctx.font = '12px monospace';
    ctx.fillText('BEST: ' + best, W/2, H/2 + 142);
  }
}

function drawGameover() {
  drawBg();
  drawParticles();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f44';
  ctx.font = 'bold 30px monospace';
  ctx.shadowColor = '#f44';
  ctx.shadowBlur = 20;
  ctx.fillText('CORRUPTED', W/2, H/2 - 80);
  ctx.shadowBlur = 0;
  ctx.fillStyle = `hsl(${hue},100%,70%)`;
  ctx.font = 'bold 54px monospace';
  ctx.shadowColor = `hsl(${hue},100%,60%)`;
  ctx.shadowBlur = 16;
  ctx.fillText(score, W/2, H/2 - 14);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '14px monospace';
  ctx.fillText('BEST: ' + best, W/2, H/2 + 22);
  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px monospace';
  ctx.fillText('TAP TO RETRY', W/2, H/2 + 68);
  ctx.globalAlpha = 1;
}

function loop(ts) {
  const elapsed = ts - lastTime;
  lastTime = ts;
  hue = (hue + 0.25) % 360;

  if (state === 'playing') {
    update();
    ctx.save();
    ctx.translate(shakeDx, shakeDy);
    drawBg();
    for (const p of platforms) drawPlatform(p);
    drawParticles();
    drawPlayer();
    ctx.restore();
    drawHUD();
  } else if (state === 'start') {
    hue = (hue + 0.1) % 360;
    drawStart();
  } else {
    drawGameover();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
